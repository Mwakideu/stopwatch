<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title></title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="content">
            <h2>Stop Watch</h2>
            <div id="timer">
                <p>00:00:00</p>
            </div>
            <div class="buttons">
            <div id="startStopBtn">
                <i class="fa-solid fa-play" id="play"></i>
            </div>
            <div id="reset">
                <i class="fa-solid fa-arrow-rotate-left" id="reset"></i>
            </div>
            </div>
        </div>
        <script src="https://kit.fontawesome.com/efa96cfc64.js" crossorigin="anonymous"></script>
        <script src="index.js"></script>
    </body>
</html>
