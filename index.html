<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title></title>
        <link rel="stylesheet" href="./style.css">
        <script src="https://kit.fontawesome.com/efa96cfc64.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <div class="container">
            <div id="timer">
                00:00:00
            </div>
            <div id="buttons">
                <button class="startStopBtn">
                    <i class="fa-solid fa-play" id="play"></i>
                </button>
                <button class="reset">
                    <i class="fa-solid fa-arrow-rotate-left" id="reset"></i>
                </button>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
